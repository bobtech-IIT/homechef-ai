<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Homechef AI - Multilingual Indian Kitchen Food Planner</title>
    
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('ServiceWorker registered:', reg.scope))
            .catch(err => console.error('ServiceWorker registration failed:', err));
        });
      }
    </script>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Homechef AI is a warm, emotionally intelligent multilingual Indian household food planning assistant. Reduce the stress of daily meal decisions." />
    <meta name="author" content="Homechef AI" />
    
    <!-- iOS / PWA Capabilities -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Homechef AI" />
    <meta name="theme-color" content="#FCF5EC" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Google Fonts: Atkinson Hyperlegible & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      /* Ensure scroll bouncing and standalone feel on iOS */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #FCF8F2;
        -webkit-tap-highlight-color: transparent;
        font-family: 'Atkinson Hyperlegible', sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
